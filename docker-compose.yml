services:
  console:
    container_name: oasm-console
    image: oasm/oasm-console:${IMAGE_TAG:-latest}
    platform: linux/amd64
    networks:
      - oasm
    ports:
      - '6276:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    depends_on:
      core-api:
        condition: service_healthy

  core-api:
    container_name: oasm-api
    image: oasm/oasm-api:${IMAGE_TAG:-latest}
    platform: linux/amd64
    networks:
      - oasm
    ports:
      - '16276:16276'
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-open_asm}
      - POSTGRES_SSL=${POSTGRES_SSL:-false}
      - PORT=${PORT:-6276}
      - OASM_CLOUD_APIKEY=${OASM_CLOUD_APIKEY}
      - REDIS_URL=${REDIS_URL:-redis://:open_asm@redis:6379/0}
      - GEO_IP_URL=geo-ip-database:4360
      - RUSTFS_ENDPOINT=${RUSTFS_ENDPOINT:-http://rustfs:9000}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfssecret}
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      geo-ip-database:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${PORT:-6276}/api/health']
      interval: 1s
      timeout: 60s
      retries: 10

  rustfs:
    container_name: oasm-rustfs
    image: rustfs/rustfs:latest
    networks:
      - oasm
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfssecret
    volumes:
      - rustfs-data:/data:rw
    restart: 'always'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    command: ['/data']

  migration:
    container_name: oasm-migration
    image: oasm/oasm-api:${IMAGE_TAG:-dev}
    platform: linux/amd64
    networks:
      - oasm
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-open_asm}
      - POSTGRES_SSL=${POSTGRES_SSL:-false}
    command: sh -c "npx typeorm migration:run -d dist/database/database-config.js"
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy

  oasm-worker:
    image: oasm/oasm-worker:${IMAGE_TAG:-latest}
    platform: linux/amd64
    environment:
      - WORKER_API_KEY=change_me
      - WORKER_GRPC_HOST=core-api
      - WORKER_GRPC_PORT=16276
      - WORKER_MAX_CONCURRENCY=10
      - WORKER_TOOL_PATH=/app/oasm-tools
    volumes:
      - type: volume
        target: /app/oasm-tools
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
      - oasm
    restart: on-failure
    depends_on:
      core-api:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3

  postgres:
    container_name: oasm-postgres
    image: pgvector/pgvector:pg17
    restart: on-failure
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-open_asm}
      - POSTGRES_HOST_AUTH_METHOD=trust
      - PGUSER=${POSTGRES_USERNAME:-postgres}
      - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    volumes:
      - pgdata:/var/lib/postgresql/data:rw
    networks:
      - oasm
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready']
      interval: 1s
      timeout: 5s
      retries: 10

  redis:
    container_name: oasm-redis
    image: redis:alpine
    restart: on-failure
    networks:
      - oasm
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --save 3600 1 --save 30 500 --save 300 100 --save 60 10000
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1500M
        reservations:
          cpus: '0.5'
          memory: 512M

  geo-ip-database:
    container_name: geo-ip-database
    image: ghcr.io/l1ttps/geoip-proxy:latest
    platform: linux/amd64
    networks:
      - oasm
    restart: on-failure
    volumes:
      - geoip-data:/app/data:rw
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4360']
      interval: 1s
      timeout: 60s
      retries: 10

volumes:
  pgdata:
  redis-data:
  geoip-data:
  rustfs-data:

networks:
  oasm:
    driver: bridge
    name: oasm_net
