services:
  oasm-nessus:
    container_name: oasm-worker-nessus
    image: oasm/oasm-nessus:latest
    platform: linux/amd64
    # networks:
    #   - oasm
    network_mode: "host"
    restart: no
    volumes:
      - ./config.yml:/root/configs/config.yml

  docker-nessus:
    container_name: docker-nessus
    image: tenable/nessus:latest-ubuntu
    restart: no
    ports:
      - "8834:8834"
    environment:
      - USERNAME=admin
      - PASSWORD=admin
      - ACTIVATION_CODE=your-activation-code
    networks:
      - oasm
    volumes:
      - nessus-official-data:/opt/nessus/var/nessus

volumes:
  nessus-data:

networks:
  oasm:
    external: true
    name: oasm_net
